name: Eve E2E

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  eval:
    name: Archil Eve eval
    runs-on: ubuntu-latest
    env:
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      ARCHIL_API_KEY: ${{ secrets.ARCHIL_API_KEY }}
      ARCHIL_REGION: ${{ secrets.ARCHIL_REGION }}
      ARCHIL_E2E_DISK_ID: ${{ secrets.ARCHIL_E2E_DISK_ID }}
      ARCHIL_E2E_ROOT_PREFIX: archil-e2e/github/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run Archil Eve eval
        run: pnpm --filter @archildata/eve-e2e eval
